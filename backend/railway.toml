[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py collectstatic --noinput && python manage.py migrate && python manage.py shell -c \"from accounts.models import User; User.objects.filter(is_superuser=True).exists() or User.objects.create_superuser(email='admin@wazan.com', password='Admin@1234', full_name='Admin')\" && gunicorn wazan.wsgi --bind 0.0.0.0:$PORT --log-file -"
healthcheckPath = "/admin/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
